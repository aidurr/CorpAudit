name: Manual Build (CorpAudit)

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Mark as release (creates a GitHub Release)'
        required: false
        default: false
        type: boolean

jobs:
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpaudit-windows
          path: target/x86_64-pc-windows-msvc/release/corpaudit.exe
          if-no-files-found: error

  build-linux-musl:
    name: Linux x86_64 (musl - static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpaudit-linux-musl
          path: target/x86_64-unknown-linux-musl/release/corpaudit
          if-no-files-found: error

  build-linux-gnu:
    name: Linux x86_64 (glibc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpaudit-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/corpaudit
          if-no-files-found: error

  build-macos:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpaudit-macos-intel
          path: target/x86_64-apple-darwin/release/corpaudit
          if-no-files-found: error

  build-macos-arm:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpaudit-macos-apple-silicon
          path: target/aarch64-apple-darwin/release/corpaudit
          if-no-files-found: error
